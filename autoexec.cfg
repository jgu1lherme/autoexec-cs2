// ============================================================
//  autoexec.cfg — CS2 JGUILHERME
//  Local: C:\Program Files (x86)\Steam\userdata\steamaccount\730\local\cfg\autoexec.cfg
//  Launch Options recomendadas: -novid -nojoy -threads 8 -noaafonts -exec autoexec
// ============================================================


// ── MOUSE ────────────────────────────────────────────────────
sensitivity             2.000000
m_pitch                 0.022000
m_yaw                   0.022000
zoom_sensitivity_ratio  1.000000


// ── MIRA (Crosshair) ────────────────────────────────────────
cl_crosshairstyle               5
cl_crosshairsize                1
cl_crosshairthickness           0
cl_crosshairgap                 -2
cl_crosshairalpha               255
cl_crosshaircolor               4
cl_crosshaircolor_r             255
cl_crosshaircolor_g             255
cl_crosshaircolor_b             255
cl_crosshairdot                 1
cl_crosshair_drawoutline        0
cl_crosshair_outlinethickness   1
cl_crosshairusealpha            1
cl_crosshair_sniper_width       1
cl_crosshair_recoil             0
cl_fixedcrosshairgap            3
cl_crosshair_dynamic_splitdist  3
cl_crosshair_friendly_warning   0


// ── VIEWMODEL ────────────────────────────────────────────────
viewmodel_fov           68.000000
viewmodel_offset_x      2.500000
viewmodel_offset_y      0.000000
viewmodel_offset_z      -1.500000
viewmodel_presetpos     1
cl_prefer_lefthanded    0
fov_desired             75


// ── HUD ──────────────────────────────────────────────────────
hud_scaling                             1.000000
safezonex                               0.900000
safezoney                               0.900000
cl_hud_color                            3
hud_showtargetid                        1
cl_showloadout                          1
cl_hud_radar_scale                      1.000000
cl_hud_telemetry_frametime_show         2
cl_hud_telemetry_ping_show              1
cl_hud_telemetry_net_misdelivery_show   1
r_show_build_info                       0


// ── RADAR ────────────────────────────────────────────────────
cl_radar_scale              0.400000
cl_radar_always_centered    0
cl_radar_rotate             1
cl_radar_icon_scale_min     0.600000
cl_radar_square_always      0


// ── REDE ─────────────────────────────────────────────────────
rate                        786432
cl_net_buffer_ticks         0
mm_dedicated_search_maxping 55


// ── FPS / PERFORMANCE ────────────────────────────────────────
fps_max     300
fps_max_ui  143

// Ragdolls: maior ganho de FPS em fights e após rounds
cl_ragdoll_limit            0       // sem limite de ragdolls acumulados → zera eles
cl_predict_kill_ragdolls    0       // não processa ragdoll antes da confirmação do server

// Fragmentos de objetos quebráveis (caixas, vidros)
func_break_max_pieces       0       // elimina os pedaços — ganho pequeno mas constante

// Animações desnecessárias
enable_boneflex             0       // desativa flex facial/muscular nos modelos

// Partículas e efeitos visuais
r_drawtracers_firstperson   0       // remove tracers de bala em 1ª pessoa


// ── SOM ──────────────────────────────────────────────────────
volume                      0.303292
snd_gamevolume              1.000000
snd_gamevoicevolume         1.000000
snd_voipvolume              1.000000
snd_musicvolume             1.000000
snd_menumusic_volume        0.000000
snd_mvp_volume              0.000000
snd_roundend_volume         0.000000
snd_roundstart_volume       0.000000
snd_roundaction_volume      0.000000
snd_deathcamera_volume      0.000000
snd_mapobjective_volume     0.000000
snd_tensecondwarning_volume 0.040000
snd_mute_losefocus          1
voice_vox                   0


// ── COMPORTAMENTO GERAL ──────────────────────────────────────
con_enable                          1
cl_use_opens_buy_menu               0
cl_silencer_mode                    1
cl_sniper_auto_rezoom               1
cl_sniper_show_inaccuracy           0
cl_weapon_selection_rarity_color    1
cl_allow_animated_avatars           0
cl_player_ping_mute                 1


// ── KEYBINDS ─────────────────────────────────────────────────
bind "v"          "+voicerecord"
bind "MOUSE1"     "+attack"
bind "MOUSE4"     "slot7"
bind "MOUSE5"     "slot8"
bind "MWHEELUP"   "+jump"
bind "MWHEELDOWN" "+jump"
bind "SPACE"      "+jump"
bind "q"          "toggle cl_radar_scale 1 0.4"
bind "`"          "toggleconsole"
bind "p"          "autobuy"
bind "f"          "+lookatweapon"
bind "z"          "radio"
// bind "n"        "+jumpthrow"
bind "ALT"   "noclip"
bind "CAPSLOCK" "player_ping"


// ── TROCA DE MIRAS - TECLA O ───────────────────────────────────

// MIRA 1
alias mira1 "cl_crosshairstyle 5; cl_crosshairsize 1; cl_crosshairthickness 0; cl_crosshairgap -2; cl_crosshairalpha 255; cl_crosshaircolor 4; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshairdot 1; cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 1; cl_crosshairusealpha 1; cl_crosshair_sniper_width 1; cl_crosshair_recoil 0; cl_fixedcrosshairgap 3; cl_crosshair_dynamic_splitdist 3; cl_crosshair_friendly_warning 0; echo Mira_S1mple"

// MIRA 2
alias mira2 "cl_crosshairstyle 4; cl_crosshairsize 1; cl_crosshairthickness 1; cl_crosshairgap -4; cl_crosshair_drawoutline 0; cl_crosshairdot 0; cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshairalpha 255; echo Mira_Cyan"

// MIRA 3
alias mira3 "cl_crosshairstyle 4; cl_crosshairsize 3; cl_crosshairthickness 0.5; cl_crosshairgap -1; cl_crosshairdot 0; cl_crosshaircolor 5; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; echo Mira_Amarela"

// SISTEMA
alias troca_mira mira_1
alias mira_1 "mira1; alias troca_mira mira_2"
alias mira_2 "mira2; alias troca_mira mira_3"
alias mira_3 "mira3; alias troca_mira mira_1"

bind "o" "troca_mira"


// ── SALVAR AO RODAR ──────────────────────────────────────────
host_writeconfig

// ============================================================
